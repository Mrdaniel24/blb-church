<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Register | BLB Church — Join the Sanctuary</title>
  <meta name="description" content="Join BLB Church community. Create your member account to access events, sermons, and stay connected.">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00236f",
            "primary-container": "#1e3a8a",
            secondary: "#735c00",
            "secondary-container": "#fed01b",
            surface: "#f9f9f9",
            "surface-container-low": "#f3f3f4",
            "surface-container-high": "#e8e8e8",
            "on-surface": "#1a1c1c",
            "on-surface-variant": "#444651",
            "outline-variant": "#c5c5d3",
            outline: "#757682",
            error: "#ba1a1a",
            "error-container": "#ffdad6"
          },
          fontFamily: {
            headline: ["Inter", "sans-serif"],
            body: ["Plus Jakarta Sans", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    .register-bg {
      background: linear-gradient(135deg, #00236f 0%, #1e3a8a 50%, #264191 100%);
    }
    .input-field {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-field:focus {
      border-color: #fed01b !important;
      box-shadow: 0 0 0 3px rgba(254, 208, 27, 0.2) !important;
    }
    .step-circle {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.2s ease;
      background: #e8e8e8;
      color: #444651;
    }
    .step-circle.active {
      background: #fed01b;
      color: #231b00;
    }
    .step-circle.completed {
      background: #22c55e;
      color: #fff;
    }
    .step-line {
      width: 3rem;
      height: 1px;
      background: rgba(117, 118, 130, 0.3);
    }
    .hidden-step {
      display: none;
    }
  </style>
</head>
<body class="min-h-screen register-bg flex items-center justify-center p-4 md:p-8 font-body">

  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[10%] right-[5%] w-80 h-80 bg-white/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[10%] left-[10%] w-64 h-64 bg-yellow-300/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden">
    <div class="px-6 sm:px-10 pt-10 pb-6 text-center">
      <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg">
        <span class="material-symbols-outlined text-yellow-300 text-2xl" style="font-variation-settings:'FILL' 1;">person_add</span>
      </div>
      <h1 class="font-headline text-2xl sm:text-3xl font-extrabold text-primary tracking-tight mb-1">
        Join The Sanctuary
      </h1>
      <p class="text-sm text-[color:#444651]">
        Create your BLB Church member account
      </p>
    </div>

    <div class="flex items-center justify-center gap-3 px-6 sm:px-10 pb-6">
      <div id="step-1-indicator" class="step-circle active">1</div>
      <div class="step-line"></div>
      <div id="step-2-indicator" class="step-circle">2</div>
    </div>

    <div id="register-error" class="hidden mx-6 sm:mx-10 mb-4 p-4 rounded-xl bg-red-50 text-sm font-medium flex items-start gap-3 border border-red-200">
      <span class="material-symbols-outlined text-red-700 text-lg mt-0.5">error</span>
      <span id="register-error-text">Something went wrong.</span>
    </div>

    <div id="dept-debug" class="hidden mx-6 sm:mx-10 mb-4 p-3 rounded-xl bg-amber-50 border border-amber-200 text-[12px] text-amber-800 font-mono">
      Loading ministries...
    </div>

    <form id="register-form" class="px-6 sm:px-10 pb-4" novalidate>
      <div id="step-1" class="space-y-4">
        <div>
          <label for="full_name" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Full Name *</label>
          <input id="full_name" name="full_name" type="text" required class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="Enter your full name" />
        </div>

        <div>
          <label for="reg-email" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Email Address *</label>
          <input id="reg-email" name="email" type="email" required autocomplete="email" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="you@example.com" />
        </div>

        <div>
          <label for="phone" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Phone Number</label>
          <input id="phone" name="phone" type="tel" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="+255 700 000 000" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="reg-password" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Password *</label>
            <input id="reg-password" name="password" type="password" required minlength="6" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="Min 6 characters" />
          </div>

          <div>
            <label for="confirm-password" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Confirm Password *</label>
            <input id="confirm-password" name="confirm_password" type="password" required minlength="6" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="Repeat password" />
          </div>
        </div>

        <button type="button" id="next-step-btn" class="w-full py-3.5 rounded-xl bg-primary text-white font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary-container transition-colors mt-2">
          Continue
          <span class="material-symbols-outlined text-lg">arrow_forward</span>
        </button>
      </div>

      <div id="step-2" class="space-y-4 hidden-step">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="gender" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Gender</label>
            <select id="gender" name="gender" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm">
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>

          <div>
            <label for="marital_status" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Marital Status</label>
            <select id="marital_status" name="marital_status" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm">
              <option value="">Select</option>
              <option value="single">Single</option>
              <option value="married">Married</option>
              <option value="widowed">Widowed</option>
              <option value="divorced">Divorced</option>
            </select>
          </div>
        </div>

        <div>
          <label for="date_of_birth" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Date of Birth</label>
          <input id="date_of_birth" name="date_of_birth" type="date" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" />
        </div>

        <div>
          <label for="department_id" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Ministry / Department</label>
          <select id="department_id" name="department_id" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm">
            <option value="">Loading ministries...</option>
          </select>
        </div>

        <div>
          <label for="address" class="block text-[11px] font-bold text-[color:#444651] uppercase tracking-widest mb-2">Residential Address</label>
          <input id="address" name="address" type="text" class="input-field w-full bg-[color:#f3f3f4] border border-[color:#c5c5d3] rounded-xl py-3.5 px-4 text-sm" placeholder="Your home address" />
        </div>

        <div class="flex flex-col sm:flex-row gap-3 mt-2">
          <button type="button" id="prev-step-btn" class="sm:flex-1 py-3.5 rounded-xl border-2 border-[color:#c5c5d3] text-primary font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
            <span class="material-symbols-outlined text-lg">arrow_back</span>
            Back
          </button>

          <button type="submit" id="register-btn" class="sm:flex-[2] py-3.5 rounded-xl bg-[color:#fed01b] text-[color:#6f5900] font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2">
            <span id="register-btn-text">Create Account</span>
            <span id="register-btn-spinner" class="hidden">
              <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </form>

    <div class="px-6 sm:px-10 pb-8 pt-2 text-center">
      <p class="text-sm text-[color:#444651]">
        Already have an account?
        <a href="login.html" class="text-primary font-bold hover:underline">Sign In</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/auth.js"></script>

  <script>
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const step1Indicator = document.getElementById('step-1-indicator');
    const step2Indicator = document.getElementById('step-2-indicator');
    const errorDiv = document.getElementById('register-error');
    const errorText = document.getElementById('register-error-text');
    const debugEl = document.getElementById('dept-debug');

    function showError(message) {
      errorDiv.classList.remove('hidden');
      errorText.textContent = message || 'Something went wrong.';
    }

    function hideError() {
      errorDiv.classList.add('hidden');
      errorText.textContent = '';
    }

    function showDebug(message, type = 'info') {
      debugEl.classList.remove('hidden');
      if (type === 'error') {
        debugEl.className = 'mx-6 sm:mx-10 mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-[12px] text-red-700 font-mono';
      } else if (type === 'success') {
        debugEl.className = 'mx-6 sm:mx-10 mb-4 p-3 rounded-xl bg-green-50 border border-green-200 text-[12px] text-green-700 font-mono';
      } else {
        debugEl.className = 'mx-6 sm:mx-10 mb-4 p-3 rounded-xl bg-amber-50 border border-amber-200 text-[12px] text-amber-800 font-mono';
      }
      debugEl.textContent = message;
    }

    function validateStep1() {
      hideError();

      const fullName = document.getElementById('full_name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!fullName) {
        showError('Please enter your full name.');
        return false;
      }
      if (!email) {
        showError('Please enter your email address.');
        return false;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return false;
      }
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return false;
      }
      return true;
    }

    async function loadDepartments() {
      const select = document.getElementById('department_id');

      try {
        showDebug('Loading active ministries from database...', 'info');
        select.innerHTML = '<option value="">Loading ministries...</option>';

        const { data, error } = await supabase
          .from('departments')
          .select('id, name')
          .order('name', { ascending: true });

        if (error) {
          throw error;
        }

        if (!data || data.length === 0) {
          select.innerHTML = '<option value="">No active ministry found</option>';
          showDebug('No active departments found. Check is_active values.', 'error');
          return;
        }

        select.innerHTML = '<option value="">Select your ministry</option>';

        data.forEach((dept) => {
          const option = document.createElement('option');
          option.value = dept.id;
          option.textContent = dept.name;
          select.appendChild(option);
        });

        showDebug('✓ Loaded ' + data.length + ' active ministries successfully.', 'success');
      } catch (error) {
        console.error('loadDepartments error:', error);
        select.innerHTML = '<option value="">Failed to load ministries</option>';
        showDebug('Departments load failed: ' + (error.message || error), 'error');
      }
    }

    function goToStep2() {
      step1.classList.add('hidden-step');
      step2.classList.remove('hidden-step');
      step1Indicator.classList.remove('active');
      step1Indicator.classList.add('completed');
      step1Indicator.innerHTML = '<span class="material-symbols-outlined text-sm">check</span>';
      step2Indicator.classList.add('active');
    }

    function goToStep1() {
      step2.classList.add('hidden-step');
      step1.classList.remove('hidden-step');
      step2Indicator.classList.remove('active');
      step1Indicator.classList.remove('completed');
      step1Indicator.classList.add('active');
      step1Indicator.textContent = '1';
    }

    document.getElementById('next-step-btn').addEventListener('click', () => {
      if (validateStep1()) {
        goToStep2();
      }
    });

    document.getElementById('prev-step-btn').addEventListener('click', () => {
      hideError();
      goToStep1();
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const btn = document.getElementById('register-btn');
      const btnText = document.getElementById('register-btn-text');
      const btnSpinner = document.getElementById('register-btn-spinner');

      btn.disabled = true;
      btnText.textContent = 'Creating account...';
      btnSpinner.classList.remove('hidden');

      const formData = {
        full_name: document.getElementById('full_name').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        password: document.getElementById('reg-password').value,
        phone: document.getElementById('phone').value.trim() || null,
        gender: document.getElementById('gender').value || null,
        marital_status: document.getElementById('marital_status').value || null,
        date_of_birth: document.getElementById('date_of_birth').value || null,
        department_id: document.getElementById('department_id').value || null,
        address: document.getElementById('address').value.trim() || null
      };

      try {
        const result = await handleRegistration(formData);

        if (!result.success) {
          showError(result.error || 'Registration failed.');
          return;
        }
      } catch (err) {
        console.error('Submit error:', err);
        showError(err.message || 'An unexpected error occurred. Please try again.');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Create Account';
        btnSpinner.classList.add('hidden');
      }
    });

    
    (async function initPage() {
      try {
        if (typeof redirectIfLoggedIn === 'function') {
          await redirectIfLoggedIn();
        }
        await loadDepartments();
      } catch (error) {
        console.error('Init error:', error);
        showError(error.message || 'Failed to initialize page.');
      }
    })();
  </script>
</body>
</html>
