<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login | BLB Church — The Digital Sanctuary</title>
  <meta name="description" content="Sign in to your BLB Church member portal. Access your dashboard, contributions, and community updates.">
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#00236f",
            "primary-container": "#1e3a8a",
            "on-primary": "#ffffff",
            "on-primary-container": "#90a8ff",
            "secondary": "#735c00",
            "secondary-container": "#fed01b",
            "on-secondary": "#ffffff",
            "on-secondary-container": "#6f5900",
            "secondary-fixed": "#ffe083",
            "on-secondary-fixed": "#231b00",
            "surface": "#f9f9f9",
            "surface-container-low": "#f3f3f4",
            "surface-container-lowest": "#ffffff",
            "surface-container": "#eeeeee",
            "surface-container-high": "#e8e8e8",
            "on-surface": "#1a1c1c",
            "on-surface-variant": "#444651",
            "outline-variant": "#c5c5d3",
            "outline": "#757682",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "inverse-surface": "#2f3131",
            "inverse-on-surface": "#f0f1f1",
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  
  <!-- Shared Styles -->
  <link rel="stylesheet" href="../assets/css/shared.css"/>
  
  <style>
    .login-bg {
      background: linear-gradient(135deg, #00236f 0%, #1e3a8a 40%, #264191 70%, #4059aa 100%);
    }
    .login-card {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .input-field {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-field:focus {
      border-color: #fed01b;
      box-shadow: 0 0 0 3px rgba(254, 208, 27, 0.2);
    }
    .btn-primary-login {
      background: linear-gradient(135deg, #fed01b, #eec200);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-primary-login:hover {
      box-shadow: 0 8px 24px rgba(254, 208, 27, 0.3);
    }
    .btn-primary-login:active {
      transform: scale(0.97);
    }
    .decorative-circle {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>

<body class="min-h-screen login-bg flex items-center justify-center p-4 md:p-8">

  <!-- Decorative Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="decorative-circle absolute top-[15%] left-[10%] w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
    <div class="decorative-circle absolute bottom-[20%] right-[15%] w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl" style="animation-delay: 2s;"></div>
    <div class="decorative-circle absolute top-[60%] left-[50%] w-48 h-48 bg-white/3 rounded-full blur-2xl" style="animation-delay: 4s;"></div>
  </div>

  <!-- Login Card -->
  <div class="login-card relative z-10 bg-white/95 rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden">
    
    <!-- Header Section -->
    <div class="px-10 pt-12 pb-8 text-center">
      <!-- Church Branding -->
      <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
        <span class="material-symbols-outlined text-secondary-container text-3xl" style="font-variation-settings: 'FILL' 1;">church</span>
      </div>
      <h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight mb-2">
        The Digital Sanctuary
      </h1>
      <p class="text-sm text-on-surface-variant font-body">
        Sign in to your BLB Church portal
      </p>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="px-10 pb-4">

      <!-- Error Alert -->
      <div id="login-error" class="hidden mb-6 p-4 rounded-xl bg-error-container text-on-surface text-sm font-medium flex items-center gap-3">
        <span class="material-symbols-outlined text-error text-lg">error</span>
        <span id="login-error-text">Invalid email or password.</span>
      </div>

      <!-- Email Field -->
      <div class="mb-5">
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2" for="email">
          Email Address
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
          <input 
            id="email" 
            name="email"
            type="email" 
            required
            autocomplete="email"
            class="input-field w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-4 text-sm text-on-surface focus:ring-0 placeholder:text-outline"
            placeholder="you@example.com"
          />
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-6">
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2" for="password">
          Password
        </label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
          <input 
            id="password" 
            name="password"
            type="password" 
            required
            autocomplete="current-password"
            class="input-field w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3.5 pl-12 pr-12 text-sm text-on-surface focus:ring-0 placeholder:text-outline"
            placeholder="Enter your password"
          />
          <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-lg">visibility</span>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        id="login-btn"
        class="btn-primary-login w-full py-4 rounded-xl text-on-secondary-fixed font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2"
      >
        <span id="login-btn-text">Sign In</span>
        <span id="login-btn-spinner" class="hidden">
          <svg class="animate-spin h-5 w-5 text-on-secondary-fixed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </span>
      </button>
    </form>

    <!-- Footer Section -->
    <div class="px-10 pb-10 pt-4 text-center">
      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-outline-variant/30"></div>
        <span class="text-[10px] text-outline uppercase tracking-widest font-bold">New Here?</span>
        <div class="flex-1 h-px bg-outline-variant/30"></div>
      </div>
      <a href="register.html" class="block w-full py-3.5 rounded-xl border-2 border-primary/10 text-primary font-bold text-sm uppercase tracking-widest hover:bg-primary hover:text-on-primary transition-all duration-300">
        Request Membership
      </a>
      <a href="index.html" class="inline-block mt-6 text-xs text-outline hover:text-primary transition-colors font-medium">
        ← Back to Homepage
      </a>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App Scripts -->
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/auth.js"></script>
  
  <script>
    // Check if already logged in
    (async () => {
      await redirectIfLoggedIn();
    })();

    // Check for error params
    const errorParam = getUrlParam('error');
    if (errorParam === 'inactive') {
      document.getElementById('login-error').classList.remove('hidden');
      document.getElementById('login-error-text').textContent = 'Your account has been deactivated. Please contact the church office.';
    }

    // Toggle password visibility
    document.getElementById('toggle-password').addEventListener('click', function() {
      const pwInput = document.getElementById('password');
      const icon = this.querySelector('.material-symbols-outlined');
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        pwInput.type = 'password';
        icon.textContent = 'visibility';
      }
    });

    // Handle login form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      const btnSpinner = document.getElementById('login-btn-spinner');

      // Reset error
      errorDiv.classList.add('hidden');

      // Show loading state
      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      btnSpinner.classList.remove('hidden');

      try {
        const result = await handleLogin(email, password);

        if (!result.success) {
          errorDiv.classList.remove('hidden');
          errorText.textContent = result.error;
          btn.disabled = false;
          btnText.textContent = 'Sign In';
          btnSpinner.classList.add('hidden');
        }
        // If success, handleLogin will redirect automatically
      } catch (err) {
        errorDiv.classList.remove('hidden');
        errorText.textContent = 'An unexpected error occurred. Please try again.';
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
